name: Deploy wllama to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build root wllama package
        run: npm ci && npm run build

      - name: Build wllama chat example
        run: npm ci && npm run build
        working-directory: examples/main

      - name: Build canvas-agent example
        run: npm ci && npm run build
        working-directory: examples/canvas-agent

      - name: Assemble dist
        run: |
          mkdir -p _site
          cp -r examples/main/dist/. _site/
          mkdir -p _site/canvas-agent
          cp -r examples/canvas-agent/dist/. _site/canvas-agent/

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@9d877eea73427180ae43cf98e8914934fe157a1a
        with:
          branch: gh-pages
          folder: _site
          clean: true
